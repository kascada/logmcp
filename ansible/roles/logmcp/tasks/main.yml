---
- name: Download logmcp package
  ansible.builtin.get_url:
    url: "https://github.com/kascada/logmcp/releases/download/v{{ logmcp_version }}/logmcp_{{ logmcp_version }}_amd64.deb"
    dest: "/tmp/logmcp_{{ logmcp_version }}_amd64.deb"
    mode: "0644"

- name: Install logmcp
  ansible.builtin.apt:
    deb: "/tmp/logmcp_{{ logmcp_version }}_amd64.deb"
    state: present

- name: Write config
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/logmcp/config.yaml
    owner: root
    group: logmcp
    mode: "0640"
  notify: restart logmcp

- name: Enable and start logmcp
  ansible.builtin.systemd:
    name: logmcp
    enabled: true
    state: started

- name: Install fail2ban config for logmcp
  ansible.builtin.command:
    cmd: logmcp security install-fail2ban
  when: logmcp_fail2ban_enabled | default(true)
  changed_when: true
  notify: reload fail2ban
