name: call_snapshot
description: |
  Combined diagnostic snapshot for a single Switchboard call.
  Collects CDR, app log, asterisk log, and service log in one call.
parameters:
  call_id:
    type: string
    optional: true
    description: "Call ID to inspect. If omitted, the most recent call is used."
steps:
  - internal: db_query
    id: cdr
    args:
      database: switchboard
      sql: >
        SELECT * FROM call_records
        WHERE call_id = {{ call_id }}
        ORDER BY started_at DESC LIMIT 1
  - internal: db_query
    id: app_log
    args:
      database: switchboard
      sql: >
        SELECT ts, level, area, event, fields
        FROM app_log
        WHERE call_id = {{ call_id }}
        ORDER BY ts DESC LIMIT 100
  - internal: read_file
    id: asterisk_log
    args:
      path: /var/log/asterisk/messages.log
      tail: true
      lines: 300
  - internal: journalctl
    id: service_log
    args:
      unit: switchboard
      window_s: 30
      around: "{{ cdr.started_at }}"
