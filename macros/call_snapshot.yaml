name: call_snapshot
description: |
  Combined diagnostic snapshot for a single Switchboard call.
  Collects CDR, app log, asterisk log, and service log in one call.
parameters:
  call_id:
    type: string
    optional: true
    description: "Call ID to inspect. If omitted, the most recent call is used."
steps:
  - internal: extension
    id: snapshot
    args:
      name: switchboard
      tool: call_snapshot
      call_id: "{{ call_id }}"
  - internal: read_file
    id: asterisk_log
    args:
      path: /var/log/asterisk/messages.log
      tail: true
      lines: 300
  - internal: journalctl
    id: service_log
    args:
      unit: switchboard
      window_s: 30
      around: "{{ snapshot.cdr.started_at }}"
